name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint Skills
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for broken links in README
        run: |
          echo "Checking README links..."
          # Basic smoke test: ensure key files exist
          for f in README.md README_zh-CN.md CLAUDE.md CONTRIBUTING.md LICENSE; do
            if [ ! -f "$f" ]; then
              echo "Missing required file: $f"
              exit 1
            fi
          done
          echo "Found $(find . -name "SKILL.md" | wc -l) skill files"
          echo "✅ All required files present"

      - name: Check skill frontmatter
        run: |
          echo "Checking skill frontmatter..."
          MISSING=0
          for skill in $(find skills -name "SKILL.md" 2>/dev/null); do
            if ! grep -q "^name:" "$skill"; then
              echo "Missing name in: $skill"
              MISSING=1
            fi
            if ! grep -q "^description:" "$skill"; then
              echo "Missing description in: $skill"
              MISSING=1
            fi
          done
          if [ "$MISSING" -eq 0 ]; then
            echo "✅ All skills have frontmatter"
          else
            echo "❌ Some skills are missing frontmatter"
            exit 1
          fi

      - name: Check version file
        run: |
          if [ ! -f framework/version ]; then
            echo "Missing: framework/version"
            exit 1
          fi
          echo "Version: $(cat framework/version)"
          echo "✅ framework/version present"

  changelog:
    name: Changelog Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify changelog has unreleased section
        run: |
          if ! grep -q "\[Unreleased\]" CHANGELOG.md; then
            echo "Missing [Unreleased] section in CHANGELOG.md"
            exit 1
          fi
          echo "✅ CHANGELOG.md has [Unreleased] section"
